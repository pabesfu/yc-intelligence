# Auto-deploy to production on push to main
# Source of truth for container config: /opt/infra/docker/docker-compose.yml
# REQUIRED secret: DEPLOY_SSH_KEY (SSH key for root@134.199.231.196)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.199.231.196
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            # 1. Pull latest code
            cd /opt/yc-intelligence
            git pull origin main

            # 2. Rebuild and restart via docker-compose (single source of truth)
            cd /opt/infra/docker
            docker compose up -d --build yc-intelligence

            # 3. Wait for startup
            sleep 8

            # 4. Health check
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:5054/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ yc-intelligence deployed and healthy"
            else
              echo "✗ yc-intelligence unhealthy (HTTP $STATUS)"
              docker logs yc-intelligence --tail 30
              exit 1
            fi
