# Auto-deploy to droplet on push to main
# REQUIRED: Add DEPLOY_SSH_KEY secret to this repo on GitHub
#   Settings > Secrets and variables > Actions > New repository secret
#   Name: DEPLOY_SSH_KEY
#   Value: SSH private key with access to root@134.199.231.196

name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 134.199.231.196
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/yc-intelligence
            git pull
            pip install -r requirements.txt --quiet
            systemctl restart yc-intelligence
