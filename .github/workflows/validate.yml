name: Validate Project Standards

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CLAUDE.md exists
        run: |
          if [ ! -f CLAUDE.md ]; then
            echo "ERROR: CLAUDE.md is required"
            exit 1
          fi
      - name: Check .gitignore exists
        run: |
          if [ ! -f .gitignore ]; then
            echo "ERROR: .gitignore is required"
            exit 1
          fi
      - name: Check no .env files committed
        run: |
          if git ls-files | grep -qE '^\.env$|^\.env\.local$'; then
            echo "ERROR: .env files should not be committed"
            exit 1
          fi
